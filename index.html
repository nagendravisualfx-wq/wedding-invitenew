<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sai Kiran & Mounika Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --gold: #D4AF37; 
            --maroon: #600000; 
            --white: #ffffff; 
            --black: #0a0a0a;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            font-family: 'Montserrat', sans-serif; 
            background: var(--black); 
            overflow-x: hidden; 
            scroll-behavior: smooth; 
        }

        /* --- NEW CINEMATIC ENTRY GATE --- */
        #entry-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            cursor: pointer;
            overflow: hidden;
        }

        .gate-half {
            position: absolute;
            width: 100%;
            height: 50.5%; /* Slight overlap to hide the seam */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://www.transparenttextures.com/patterns/dark-leather.png'), #111;
            transition: transform 1.8s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 1;
        }

        .top { top: 0; border-bottom: 1px solid rgba(212, 175, 55, 0.4); }
        .bottom { bottom: 0; border-top: 1px solid rgba(212, 175, 55, 0.4); }

        #entry-gate.opened .top { transform: translateY(-100%); }
        #entry-gate.opened .bottom { transform: translateY(100%); }

        .intro-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
            padding: 20px;
            transition: opacity 0.8s ease;
        }

        #entry-gate.opened .intro-overlay { opacity: 0; pointer-events: none; }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.8rem, 12vw, 5rem);
            color: var(--gold);
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .ampersand { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.7em; margin: 0 10px; }

        .wedding-tag {
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: #fff;
            margin-bottom: 50px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        /* Auto-Proceed Visual Cues */
        .progress-container {
            width: 180px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 0 auto 25px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            transition: width 3s linear;
        }

        .tap-hint {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--gold);
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.96); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* --- MAIN CONTENT STYLES --- */
        #main-content { display: none; opacity: 0; transition: opacity 1.5s ease; width: 100%; }
        
        .hero { 
            position: relative; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            color: var(--white); 
            overflow: hidden;
        }

        .hero-bg { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1; 
        }

        .mySlides { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); display: none; }

        .hero-content { z-index: 2; padding: 20px; }
        .hero h1 { font-family: 'Great Vibes', cursive; font-size: 4rem; margin: 0; color: var(--gold); }
        .hero p { font-size: 1.2rem; letter-spacing: 3px; margin: 10px 0; }

        #music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1001;
            background: rgba(212, 175, 55, 0.9);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: none;
            font-size: 14px;
        }

        /* Petals / Effects */
        #petals { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .petal { position: absolute; background: #ffb7c5; border-radius: 150% 0 150% 0; opacity: 0.7; animation: fall linear infinite; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }

        section { padding: 80px 20px; text-align: center; color: var(--white); }
        .gold-text { color: var(--gold); }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="entry-gate" onclick="initiateExperience()">
        <div class="gate-half top"></div>
        <div class="gate-half bottom"></div>
        
        <div class="intro-overlay">
            <div class="names">Sai Kiran <span class="ampersand">&</span> Mounika</div>
            <div class="wedding-tag">The Wedding Celebration</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="p-bar"></div>
            </div>
            
            <div class="tap-hint">TAP TO ENTER</div>
        </div>
    </div>

    <button id="music-btn" onclick="toggleMusic()">🎵 Music</button>

    <div id="main-content">
        <div id="petals"></div>

        <section class="hero">
            <div class="hero-bg">
                <img class="mySlides" src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920&q=80" alt="Slide 1">
                <img class="mySlides" src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1920&q=80" alt="Slide 2">
            </div>
            <div class="hero-content">
                <h1>Sai Kiran & Mounika</h1>
                <p>WE ARE GETTING MARRIED</p>
                <p class="gold-text">SAVE THE DATE: 24th AUGUST 2024</p>
            </div>
        </section>

        <section id="details">
            <h2 class="gold-text">Our Story</h2>
            <p style="max-width: 600px; margin: 0 auto; line-height: 1.8; opacity: 0.9;">
                Two hearts, one soul. Join us as we begin our beautiful journey together 
                surrounded by the people we love most.
            </p>
        </section>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const gate = document.getElementById('entry-gate');
        const progressBar = document.getElementById('p-bar');
        const musicBtn = document.getElementById('music-btn');
        let experienceStarted = false;
        let isMusicPlaying = false;

        // 1. Initialize logic on load
        window.onload = () => {
            // Start the visual countdown immediately
            setTimeout(() => {
                if (progressBar) progressBar.style.width = '100%';
            }, 100);

            // AUTO-TRANSITION FALLBACK: If user does nothing for 3.2 seconds, open gate
            setTimeout(() => {
                if (!experienceStarted) initiateExperience();
            }, 3200);
        };

        function initiateExperience() {
            if (experienceStarted) return;
            experienceStarted = true;

            // Handle Music Playback
            playMusicSafely();

            // Trigger the cinematic curtain animation
            gate.classList.add('opened');

            // Reveal the content
            const mainContent = document.getElementById('main-content');
            mainContent.style.display = 'block';
            
            setTimeout(() => {
                mainContent.style.opacity = '1';
                musicBtn.style.display = 'block';
                startSlideshow();
                createPetals();
            }, 100);

            // Remove gate from DOM after animation completes to clean up
            setTimeout(() => { gate.style.display = 'none'; }, 2000);
        }

        function playMusicSafely() {
            // Attempt to play music
            let playPromise = music.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    isMusicPlaying = true;
                }).catch(error => {
                    // Browser blocked autoplay (fallback triggered without user tap)
                    // We wait for the VERY NEXT interaction (scroll or tap) to start music
                    const startOnInteraction = () => {
                        music.play();
                        isMusicPlaying = true;
                        document.removeEventListener('touchstart', startOnInteraction);
                        document.removeEventListener('click', startOnInteraction);
                    };
                    document.addEventListener('touchstart', startOnInteraction, {once: true});
                    document.addEventListener('click', startOnInteraction, {once: true});
                });
            }
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                music.pause();
                musicBtn.innerHTML = '🔇 Muted';
            } else {
                music.play();
                musicBtn.innerHTML = '🎵 Music';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // --- SLIDESHOW LOGIC ---
        let slideIndex = 0;
        function startSlideshow() {
            const slides = document.getElementsByClassName("mySlides");
            for (let i = 0; i < slides.length; i++) { slides[i].style.display = "none"; }
            slideIndex++;
            if (slideIndex > slides.length) { slideIndex = 1; }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(startSlideshow, 4000);
        }

        // --- PETAL LOGIC ---
        function createPetals() {
            const container = document.getElementById('petals');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.width = Math.random() * 10 + 5 + 'px';
                petal.style.height = petal.style.width;
                petal.style.animationDuration = Math.random() * 5 + 5 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(petal);
            }
        }
    </script>
</body>
</html>
